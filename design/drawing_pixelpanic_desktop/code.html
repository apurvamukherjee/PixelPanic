<script>
        // Simple timer logic
        let seconds = 42;
        const timerEl = document.getElementById('game-timer');
        
        const updateTimer = () => {
            if (seconds <= 0) return;
            seconds--;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (seconds < 10) {
                timerEl.parentElement.classList.add('timer-pulse', 'border-tertiary-container');
            }
        };
        setInterval(updateTimer, 1000);

        // Dummy drawing interaction
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#0F172A';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => {
            drawing = false;
            ctx.beginPath();
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        // Trigger notification after a few seconds for demo
        setTimeout(() => {
            const notif = document.getElementById('success-notif');
            notif.classList.remove('translate-y-32');
            setTimeout(() => {
                notif.classList.add('translate-y-32');
            }, 4000);
        }, 3000);
    </script>
